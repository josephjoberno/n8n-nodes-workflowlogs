name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm install

      - name: TypeScript build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/nodes/N8nLogs/N8nLogs.node.js || (echo "Missing node dist" && exit 1)
          test -f dist/credentials/N8nLogsApi.credentials.js || (echo "Missing credentials dist" && exit 1)

      - name: Check package structure
        run: |
          node -e "
            const pkg = require('./package.json');
            const assert = require('assert');
            assert(pkg.n8n, 'Missing n8n config');
            assert(pkg.n8n.nodes.length > 0, 'No nodes declared');
            assert(pkg.n8n.credentials.length > 0, 'No credentials declared');
            console.log('Package structure OK');
          "
